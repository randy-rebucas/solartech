# DO NOT commit actual secrets. Use a secrets manager (Vault, Sealed Secrets, AWS Secrets Manager).
# This is a template — replace <base64> values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: solartech-api-secrets
  namespace: solartech
type: Opaque
data:
  MONGODB_URI: <base64-encoded-value>
  REDIS_URL: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  JWT_REFRESH_SECRET: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  STRIPE_SECRET_KEY: <base64-encoded-value>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-value>
  SMTP_USER: <base64-encoded-value>
  SMTP_PASS: <base64-encoded-value>
  GOOGLE_CLIENT_ID: <base64-encoded-value>
  GOOGLE_CLIENT_SECRET: <base64-encoded-value>
  GITHUB_CLIENT_ID: <base64-encoded-value>
  GITHUB_CLIENT_SECRET: <base64-encoded-value>
