version: '3.9'

# Development override — only infrastructure services, apps run on host
services:
  mongodb:
    image: mongo:7.0
    container_name: solartech-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: solartech
      MONGO_INITDB_ROOT_PASSWORD: solartech_dev
      MONGO_INITDB_DATABASE: solartech
    volumes:
      - mongo_dev_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7.2-alpine
    container_name: solartech-redis-dev
    command: redis-server --requirepass solartech_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: solartech-mqtt-dev
    volumes:
      - ./infra/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9001:9001"

volumes:
  mongo_dev_data:
  redis_dev_data:
