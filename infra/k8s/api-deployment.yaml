apiVersion: apps/v1
kind: Deployment
metadata:
  name: solartech-api
  namespace: solartech
  labels:
    app: solartech-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solartech-api
  template:
    metadata:
      labels:
        app: solartech-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/solartech-api:IMAGE_TAG
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: solartech-api-secrets
            - configMapRef:
                name: solartech-api-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: solartech-api
  namespace: solartech
spec:
  selector:
    app: solartech-api
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solartech-api-hpa
  namespace: solartech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solartech-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
