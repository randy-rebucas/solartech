apiVersion: v1
kind: ConfigMap
metadata:
  name: solartech-api-config
  namespace: solartech
data:
  NODE_ENV: production
  PORT: "3001"
  API_PREFIX: api
  THROTTLE_LIMIT: "100"
  THROTTLE_TTL: "60000"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: solartech-web-config
  namespace: solartech
data:
  NEXT_PUBLIC_API_URL: https://api.solartech.ph
  NEXT_PUBLIC_WS_URL: wss://api.solartech.ph
